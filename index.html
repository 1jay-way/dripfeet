<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="DripFit is your go-to online store for affordable and stylish sneakers in Nigeria. Shop trendy footwear for all budgets with fast ordering and reliable delivery.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dripfeet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>.<span>D</span>rip<span>F</span>eet</h1>

    <button onclick="toggleCart()">
        🛒 Cart (<span id="cart-count">0</span>)
    </button>
</header>

<!-- PRODUCTS -->
<section class="products">
    <h2>Products</h2>

    <div id="products-container" class="products-container"></div>
</section>

<!-- CART SIDEBAR -->
<div id="cart" class="cart">

    <!-- CLOSE BUTTON -->
    <button onclick="toggleCart()" style="background:red; margin-bottom:10px;">
        ✖ Close Cart
    </button>

    <h2>Your Cart</h2>

    <div id="cart-items"></div>

    <h3>Total: ₦<span id="total">0</span></h3>

    <button onclick="checkoutWhatsApp()" style="background:green;">
        Order via WhatsApp
    </button>

    <button onclick="clearCart()" style="background:red;">
        Clear Cart
    </button>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 sòjika. All rights reserved.</p>
</footer>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
